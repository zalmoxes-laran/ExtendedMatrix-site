bio: "Researcher and practitioner at the University of Alicante in digital cultural heritage, focused on virtual reconstruction, 3D documentation and immersive narratives for archaeology and museums. Contributes to the Extended Matrix community by exploring how EM can support transparent and scientifically reliable heritage visualisation, particularly in complex reconstructions involving historical characters, movement and animation."
