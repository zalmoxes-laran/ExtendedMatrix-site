name: "Survey specialist"
alias: "The reality capturer"
emPhase: "data-collection"
clusters: ["modeller"]
order: 30
# Broadened summary on 2026-06-30 to cover the vertical survey
# subfields — photogrammetry, structured-light, total station,
# GNSS, drone, LiDAR, AND geophysical prospection (georadar,
# magnetometry, geoelectric). All of them share the same role in
# the EM workflow: producing reality-based captured data that
# feeds the graph as evidence. Domain specialists (a geophysicist,
# a topographic surveyor, a photogrammetrist) all inhabit this
# persona depending on the campaign.
summary: "Plans and runs on-site or in-lab capture of reality-based data — photogrammetry, structured-light, total station, GNSS, drone, LiDAR, geophysical prospection. Produces the datasets the rest of the EM workflow annotates and reconstructs over. Home for geophysicists, topographic surveyors and photogrammetrists."
tools:
  - "3dsc"
  - "3dsc-metashape"
source: "Demetrescu & Ferdani 2021, Applied Sciences 11(11):5206. doi:10.3390/app11115206"
