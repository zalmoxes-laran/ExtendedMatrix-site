summary: "Plans and runs the on-site or in-lab 3D capture: photogrammetry, structured-light scanning, total station, GNSS, drone surveys. Produces the dense reality-based data (point clouds, meshes, orthomosaics) that the rest of the EM workflow then annotates, simplifies and reconstructs over."
