name: "Stratigrapher"
alias: "The palimpsest reader"
# emPhase moved from `data-management` to `data-collection` on
# 2026-06-30: the stratigrapher's primary act — reading the
# stratigraphic palimpsest — is the foundational data-collection
# gesture of an EM project, on the excavation, on standing
# monuments, on reality, on the 3D model, on the documentary
# sources. Everything that follows (source dossier, 3D survey, EM
# graph, proxies) cascades from this reading. Rendering-wise, this
# also puts the stratigrapher first on the personas page, which
# reflects the editorial intent: an EM project starts with someone
# who can read what is there.
emPhase: "data-collection"
clusters: ["archaeologist"]
order: 5
summary: "Reads the stratigraphic palimpsest across every surface it appears on: the excavation, the standing monument, the 3D survey, the documentary sources. Names stratigraphic units (SU), virtual stratigraphic units (USV), special finds (SF) and the relationships between them. The intellectual author of what the graph eventually encodes — and by extension the natural home of material-culture readings (ceramics, epigraphy, numismatics) that classify what the palimpsest contains."
tools:
  - "yed-palette"
  - "pyarchinit"
  - "source-list-xlsx"
source: "Demetrescu & Ferdani 2021, Applied Sciences 11(11):5206. doi:10.3390/app11115206"
