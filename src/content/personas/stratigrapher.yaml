summary: "The interpretive archaeologist. Reads the evidence assembled by the source hunter and the 3D survey specialist and articulates it as stratigraphic units (SU), virtual stratigraphic units (USV), special finds (SF) and the relationships between them. The intellectual author of what the graph eventually encodes."
