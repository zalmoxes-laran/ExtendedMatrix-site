name: Build site

# Build the site on every push and PR.
# Deploy is intentionally split out so we can switch hosting (GitHub Pages /
# Cloudflare Pages / Netlify) without touching the build pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The Blender add-on catalog lives in the BlenderAddons4CH repo,
          # included here as a git submodule (vendor/blenderaddons4ch). The
          # prebuild sync copies its data into the content collection.
          submodules: recursive

      - name: Setup Node
        # v5+ runs on Node 24 natively (v4 targeted Node 20, which GitHub
        # deprecated on 2026-Q3 — the runner was forcibly upgrading it to
        # Node 24 anyway, triggering the "Node.js 20 is deprecated" warning
        # on every build). Bumped 2026-07-06 to silence that warning and
        # align with the current LTS. Node 22 (Jod) is the active LTS at
        # the time of this bump.
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type-check & build
        run: npm run build

      - name: Upload build artifact
        # v5 (released 2026-04-10) uses actions/upload-artifact@v7
        # underneath — the transitive dependency that triggered the
        # "Node.js 20 is deprecated" warning on v3. Bumped alongside
        # setup-node v5 and deploy-pages v5 in the 2026-07-06 pass.
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  # ── Deploy to GitHub Pages (default) ────────────────────────────────
  # If you switch to Cloudflare Pages or Netlify, remove this job and
  # replace it with the connector for that host (Cloudflare Pages action
  # or Netlify CLI deploy). The build artifact above is what gets shipped.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # v5 runs on Node 24 natively (v4 targeted Node 20).
        uses: actions/deploy-pages@v5
