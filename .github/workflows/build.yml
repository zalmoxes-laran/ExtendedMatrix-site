name: Build site

# Build the site on every push and PR.
# Deploy is intentionally split out so we can switch hosting (GitHub Pages /
# Cloudflare Pages / Netlify) without touching the build pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type-check & build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Deploy to GitHub Pages (default) ────────────────────────────────
  # If you switch to Cloudflare Pages or Netlify, remove this job and
  # replace it with the connector for that host (Cloudflare Pages action
  # or Netlify CLI deploy). The build artifact above is what gets shipped.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
