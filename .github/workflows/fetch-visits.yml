name: Fetch GoatCounter visits

# Refreshes public/data/visits.json from GoatCounter once a day (and on demand
# via "Run workflow"). The committed file is then served as a static asset by
# the Astro build; the /stats page fetches it client-side to render the globe.
#
# The token comes from repository secret GOATCOUNTER_TOKEN (Read statistics
# permission only). It never appears in logs or in the committed JSON.

on:
  schedule:
    # 06:00 UTC = 08:00 Europe/Rome in summer / 07:00 in winter.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # need to commit the updated JSON back to main
  actions:  write   # need to dispatch the "Build site" workflow after commit
                    # (GITHUB_TOKEN-driven pushes do not auto-trigger other
                    # workflows; see workflow_dispatch step at the end)

concurrency:
  group: fetch-visits
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          # Use the default GITHUB_TOKEN to push back; sufficient for same-repo
          # commits as long as the workflow has contents: write permission.

      - name: Fetch + assemble visits.json
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GC_TOKEN:-}" ]; then
            echo "::error::GOATCOUNTER_TOKEN secret is empty or unset. Set it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Diagnostic: token length (never the value). A valid GoatCounter
          # token is ~50 characters (e.g. the docs example is 51); anything
          # materially shorter points to a truncated paste or stray whitespace
          # in the secret. The lower-bound warning kicks in at <30 chars.
          GC_TOKEN_TRIMMED="$(printf '%s' "${GC_TOKEN}" | tr -d '[:space:]')"
          echo "Token length (untrimmed): ${#GC_TOKEN}"
          echo "Token length (trimmed):   ${#GC_TOKEN_TRIMMED}"
          if [ "${#GC_TOKEN_TRIMMED}" -lt 30 ]; then
            echo "::warning::Token appears short (${#GC_TOKEN_TRIMMED} chars). Expected ~50. Check the GOATCOUNTER_TOKEN secret."
          fi

          # Egress diagnostics — logged unconditionally so that if GoatCounter
          # rejects the request again with the catch-all `{"error":"not
          # found"}` body (which would indicate the API route isn't matched —
          # see 2026-06 investigation), we already have the GH Actions
          # egress IP + curl version in the log to attach to the upstream
          # bug report on https://github.com/arp242/goatcounter . Never
          # touches the secret.
          echo "── Runner egress diagnostics ──"
          echo "curl:           $(curl --version | head -1)"
          echo "runner.os:      $(uname -srm)"
          # ipv4.icanhazip.com is operated by Cloudflare, sub-second TTLs,
          # safe to query from CI. Fail-soft so a network blip doesn't break
          # the run.
          echo "egress.ipv4:    $(curl -sS --max-time 5 https://ipv4.icanhazip.com 2>/dev/null || echo '(unreachable)')"
          echo "───────────────────────────────"

          START="2026-06-02"
          END=$(date -u +%Y-%m-%d)
          BASE="https://emanueldemetrescu.goatcounter.com/api/v0"
          # Explicit User-Agent so the requests are identifiable in any
          # upstream filtering chain (Varnish, anti-abuse, etc.). The string
          # is intentionally botlike + URL-bearing so a goatcounter.com
          # operator can correlate a 404 catch-all back to this workflow.
          UA="ExtendedMatrixStatsBot/1.0 (+https://extendedmatrix.org; gh-actions fetch-visits)"

          tmp_loc=$(mktemp)
          tmp_tot=$(mktemp)

          # Helper that captures HTTP status + body so failures print the
          # GoatCounter error message instead of a curl exit code, retries
          # on non-200 with exponential backoff (2s / 4s / 8s — keep the
          # whole job inside the workflow_dispatch UI's perceived "fast"
          # bracket), and reports the egress IP on every retry so the
          # upstream tracker can correlate run-to-run flakiness against
          # specific Azure NAT exits.
          #
          # The retry exists because, since 2026-06-06, the `/api/v0/me`
          # preflight (now removed) and now also `/api/v0/stats/locations`
          # have been hitting GoatCounter's catch-all 404 handler from
          # GitHub Actions runner IPs — the same token + URL succeed from
          # a local terminal in the same minute. Pattern looks like
          # IP-based filtering at GoatCounter's edge (Varnish or similar)
          # rotating which Azure egress NAT exits are bucketed as
          # malicious. A small retry catches the case where the runner's
          # next outbound connection lands on a different exit IP that
          # isn't currently bucketed. Failures that persist after 3
          # attempts are surfaced as `::warning::` (not `::error::`) so
          # the workflow doesn't fail the day — see the FETCH_OK guard
          # below for the soft-fail policy.
          fetch() {
            local url="$1" outfile="$2" label="$3"
            local status attempt=0 max_attempts=3 sleep_for egress
            while [ $attempt -lt $max_attempts ]; do
              attempt=$((attempt + 1))
              status=$(curl -sS \
                -A "${UA}" \
                -H "Authorization: Bearer ${GC_TOKEN_TRIMMED}" \
                -H "Content-Type: application/json" \
                -o "${outfile}" \
                -w "%{http_code}" \
                "${url}")
              echo "→ ${label} (attempt ${attempt}/${max_attempts}): HTTP ${status}"
              if [ "${status}" = "200" ]; then
                return 0
              fi
              if [ $attempt -lt $max_attempts ]; then
                # Re-check egress IP on each retry: if a hot reconnect
                # lands on a different NAT exit, the log shows which
                # IP was used for which attempt. Helps file accurate
                # bug reports on the upstream tracker.
                egress="$(curl -sS --max-time 5 https://ipv4.icanhazip.com 2>/dev/null || echo '?')"
                sleep_for=$((1 << attempt))   # 2, 4, 8
                echo "   egress now ${egress} — waiting ${sleep_for}s before retry"
                sleep "${sleep_for}"
              fi
            done
            echo "::warning::${label} returned HTTP ${status} after ${max_attempts} attempts."
            echo "::warning::Last response body (first 500 chars):"
            head -c 500 "${outfile}" || true
            echo ""
            echo "::warning::Request URL was: ${url}"
            echo "::warning::Egress IPv4 (re-checked): $(curl -sS --max-time 5 https://ipv4.icanhazip.com 2>/dev/null || echo '(unreachable)')"
            return 1
          }

          # NOTE: the `/api/v0/me` preflight previously here was removed on
          # 2026-06-08. Its purpose was diagnostic — log permission bitmask +
          # sites scope of the token — but since 2026-06-06 it has been
          # returning HTTP 404 `{"error":"not found"}` from GitHub Actions
          # runner IPs while the same token + URL returns 200 from a local
          # macOS terminal. The 404 body matches the catch-all handler in
          # GoatCounter's `handlers/api.go` exactly, suggesting the request
          # never reaches the `/me` route (most likely a Varnish edge or
          # IP-based filter in front of the GoatCounter SaaS). The stats
          # endpoints below have well-documented error codes (401 / 403),
          # so a failed preflight was blocking the job for no useful reason.
          # Update (2026-06-14): `/stats/locations` is now exhibiting the
          # same catch-all 404 pattern intermittently. See `fetch()` retry
          # above and the FETCH_OK soft-fail guard below; upstream issue
          # draft tracked in `.cowork-work/goatcounter-issue-draft.md`.

          # Soft-fail wrapper: returns 0 if the fetch succeeded (after
          # retries), 1 if every attempt hit the catch-all 404 / other
          # non-200. The two stats endpoints are best-effort — we'd rather
          # keep yesterday's visits.json on disk than red-flag the
          # workflow when GoatCounter's edge is rotating Azure NAT exits.
          # The Commit step naturally short-circuits to "nothing to
          # commit" when visits.json isn't touched, so the cron simply
          # tries again tomorrow.
          # Set FETCH_OK=0 only when BOTH stats endpoints succeeded.
          FETCH_OK=1

          # Location stats — country breakdown.
          if ! fetch "${BASE}/stats/locations?start=${START}&end=${END}" \
                     "${tmp_loc}" "stats/locations"; then
            FETCH_OK=0
          fi

          # Total counts — overall visits & events.
          if ! fetch "${BASE}/stats/total?start=${START}&end=${END}" \
                     "${tmp_tot}" "stats/total"; then
            FETCH_OK=0
          fi

          if [ "${FETCH_OK}" = "0" ]; then
            echo "::warning::One or more stats fetches failed after retries — skipping visits.json update."
            echo "::warning::Yesterday's public/data/visits.json stays on disk; the next scheduled run will retry."
            echo "::warning::If this persists for >7 consecutive days, escalate via the upstream issue draft."
            # Exit 0: the step succeeds, no diff to visits.json, Commit
            # step short-circuits, Trigger Build step is skipped. No
            # alarm fatigue, no manual re-run needed — tomorrow's cron
            # will try again on a (probably) different egress IP.
            exit 0
          fi

          mkdir -p public/data

          python3 - "${tmp_loc}" "${tmp_tot}" "${START}" "${END}" > public/data/visits.json <<'PY'
          import json, sys, datetime, os

          loc_path, tot_path, start, end = sys.argv[1:5]
          with open(loc_path) as f:
              loc = json.load(f)
          with open(tot_path) as f:
              tot = json.load(f)

          # Locations endpoint: {"stats": [{"id": "IT", "name": "Italy", "count": 51}, ...], "more": false}
          stats = loc.get("stats", [])
          # Stable sort: highest count first; ties resolve alphabetically by country name.
          stats.sort(key=lambda r: (-int(r.get("count", 0)), r.get("name", "")))

          out = {
              "schema": 1,
              "fetched_at": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "range": {"start": start, "end": end},
              "total": int(tot.get("total", 0)),
              "total_events": int(tot.get("total_events", 0)),
              "countries": [
                  {
                      "code": r.get("id"),
                      "name": r.get("name"),
                      "count": int(r.get("count", 0)),
                  }
                  for r in stats
              ],
          }
          json.dump(out, sys.stdout, ensure_ascii=False, indent=2)
          sys.stdout.write("\n")
          PY

          echo "── public/data/visits.json (preview) ──"
          head -30 public/data/visits.json

      - name: Commit + push if changed
        id: commit
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- public/data/visits.json; then
            echo "No change to public/data/visits.json — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add public/data/visits.json
          git commit -m "chore(stats): refresh visits.json from GoatCounter"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Build site workflow
        # Commits pushed with the default GITHUB_TOKEN don't auto-trigger
        # other workflows (anti-loop protection). We have to fan out
        # explicitly via workflow_dispatch so Astro rebuilds with the
        # fresh visits.json. Skipped when no data change happened.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yml --ref main
          echo "Dispatched Build site workflow."
