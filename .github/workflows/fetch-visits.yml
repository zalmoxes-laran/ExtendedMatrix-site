name: Fetch GoatCounter visits

# Refreshes public/data/visits.json from GoatCounter once a day (and on demand
# via "Run workflow"). The committed file is then served as a static asset by
# the Astro build; the /stats page fetches it client-side to render the globe.
#
# The token comes from repository secret GOATCOUNTER_TOKEN (Read statistics
# permission only). It never appears in logs or in the committed JSON.

on:
  schedule:
    # 06:00 UTC = 08:00 Europe/Rome in summer / 07:00 in winter.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # need to commit the updated JSON back to main
  actions:  write   # need to dispatch the "Build site" workflow after commit
                    # (GITHUB_TOKEN-driven pushes do not auto-trigger other
                    # workflows; see workflow_dispatch step at the end)

concurrency:
  group: fetch-visits
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          # Use the default GITHUB_TOKEN to push back; sufficient for same-repo
          # commits as long as the workflow has contents: write permission.

      - name: Fetch + assemble visits.json
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GC_TOKEN:-}" ]; then
            echo "::error::GOATCOUNTER_TOKEN secret is empty or unset. Set it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Diagnostic: token length (never the value). A valid GoatCounter
          # token is 45 chars; anything materially different points to a
          # truncated paste or stray whitespace in the secret.
          GC_TOKEN_TRIMMED="$(printf '%s' "${GC_TOKEN}" | tr -d '[:space:]')"
          echo "Token length (untrimmed): ${#GC_TOKEN}"
          echo "Token length (trimmed):   ${#GC_TOKEN_TRIMMED}"
          if [ "${#GC_TOKEN_TRIMMED}" -lt 30 ]; then
            echo "::warning::Token appears short (${#GC_TOKEN_TRIMMED} chars). Expected ~45. Check the GOATCOUNTER_TOKEN secret."
          fi

          START="2026-06-02"
          END=$(date -u +%Y-%m-%d)
          BASE="https://emanueldemetrescu.goatcounter.com/api/v0"

          tmp_loc=$(mktemp)
          tmp_tot=$(mktemp)

          # Helper that captures HTTP status + body so failures print the
          # GoatCounter error message instead of a curl exit code.
          fetch() {
            local url="$1" outfile="$2" label="$3"
            local status
            status=$(curl -sS \
              -H "Authorization: Bearer ${GC_TOKEN_TRIMMED}" \
              -H "Content-Type: application/json" \
              -o "${outfile}" \
              -w "%{http_code}" \
              "${url}")
            echo "→ ${label}: HTTP ${status}"
            if [ "${status}" != "200" ]; then
              echo "::error::${label} returned HTTP ${status}. Response body (first 500 chars):"
              head -c 500 "${outfile}" || true
              echo ""
              echo "::error::Request URL was: ${url}"
              return 1
            fi
            return 0
          }

          # Pre-flight: hit /me to confirm the token resolves to a user
          # and to log its actual permission bitmask + site scope. When
          # the /stats calls 404, comparing /me's response against a
          # known-good run isolates whether the issue is the token's
          # permissions (different bitmask), its scope (sites != [-1]),
          # or something else entirely on the GoatCounter side.
          tmp_me=$(mktemp)
          me_status=$(curl -sS \
            -H "Authorization: Bearer ${GC_TOKEN_TRIMMED}" \
            -H "Content-Type: application/json" \
            -o "${tmp_me}" \
            -w "%{http_code}" \
            "${BASE}/me")
          echo "→ pre-flight /me: HTTP ${me_status}"
          if [ "${me_status}" != "200" ]; then
            echo "::error::/me returned HTTP ${me_status} — token is rejected at the auth layer. Body (first 500 chars):"
            head -c 500 "${tmp_me}" || true
            echo ""
            echo "::error::Regenerate GOATCOUNTER_TOKEN with Read statistics + All sites, update the GitHub secret, re-run."
            exit 1
          fi
          # Pull out non-secret token metadata (name, permissions bitmask,
          # sites scope, user id/email). Never logs the token value.
          python3 - "${tmp_me}" <<'PY'
          import json, sys
          with open(sys.argv[1]) as f:
              me = json.load(f)
          u = me.get("user", {})
          t = me.get("token", {})
          print(f"  user.id:           {u.get('id')}")
          print(f"  user.email:        {u.get('email')}")
          print(f"  user.site:         {u.get('site')}")
          print(f"  token.name:        {t.get('name')!r}")
          print(f"  token.permissions: {t.get('permissions')}")
          print(f"  token.sites:       {t.get('sites')}")
          PY

          # Location stats — country breakdown.
          fetch "${BASE}/stats/locations?start=${START}&end=${END}" \
                "${tmp_loc}" "stats/locations"

          # Total counts — overall visits & events.
          fetch "${BASE}/stats/total?start=${START}&end=${END}" \
                "${tmp_tot}" "stats/total"

          mkdir -p public/data

          python3 - "${tmp_loc}" "${tmp_tot}" "${START}" "${END}" > public/data/visits.json <<'PY'
          import json, sys, datetime, os

          loc_path, tot_path, start, end = sys.argv[1:5]
          with open(loc_path) as f:
              loc = json.load(f)
          with open(tot_path) as f:
              tot = json.load(f)

          # Locations endpoint: {"stats": [{"id": "IT", "name": "Italy", "count": 51}, ...], "more": false}
          stats = loc.get("stats", [])
          # Stable sort: highest count first; ties resolve alphabetically by country name.
          stats.sort(key=lambda r: (-int(r.get("count", 0)), r.get("name", "")))

          out = {
              "schema": 1,
              "fetched_at": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "range": {"start": start, "end": end},
              "total": int(tot.get("total", 0)),
              "total_events": int(tot.get("total_events", 0)),
              "countries": [
                  {
                      "code": r.get("id"),
                      "name": r.get("name"),
                      "count": int(r.get("count", 0)),
                  }
                  for r in stats
              ],
          }
          json.dump(out, sys.stdout, ensure_ascii=False, indent=2)
          sys.stdout.write("\n")
          PY

          echo "── public/data/visits.json (preview) ──"
          head -30 public/data/visits.json

      - name: Commit + push if changed
        id: commit
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- public/data/visits.json; then
            echo "No change to public/data/visits.json — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add public/data/visits.json
          git commit -m "chore(stats): refresh visits.json from GoatCounter"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Build site workflow
        # Commits pushed with the default GITHUB_TOKEN don't auto-trigger
        # other workflows (anti-loop protection). We have to fan out
        # explicitly via workflow_dispatch so Astro rebuilds with the
        # fresh visits.json. Skipped when no data change happened.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yml --ref main
          echo "Dispatched Build site workflow."
